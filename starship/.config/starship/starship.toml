palette = "catppuccin_mocha"

# Two-line prompt: info on line 1, cursor on line 2
format = """
$username$hostname$directory$git_branch$git_status$git_state$custom$nodejs$fill$cmd_duration$time
$character"""

# Right prompt (currently unused, but available)
# right_format = ""

[aws]
disabled = true

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[cmd_duration]
min_time = 2000
style = "yellow"

[dotnet]
disabled = true

[custom.dotnet]
command = 'dotnet --version'
when = 'test -f "$(git rev-parse --show-toplevel 2>/dev/null)/global.json"'
symbol = '󰪮 '
format = '[$symbol($output)]($style) '
style = 'mauve'
shell = ['bash', '--noprofile', '--norc']

[git_branch]
style = 'green'
symbol = '󰘬 '
truncation_length = 16
truncation_symbol = '…'
ignore_branches = []

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = 'red'
staged = '[+$count](green)'
modified = '[~$count](yellow)'
untracked = '[?$count](blue)'
deleted = '[-$count](red)'
conflicted = '[!$count](red bold)'
ahead = '[⇡$count](green)'
behind = '[⇣$count](red)'
diverged = '[⇡$ahead_count⇣$behind_count](yellow)'

[git_state]
style = 'yellow bold'
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[package]
disabled = true

[nodejs]
symbol = '󰎙 '
style = 'green'
format = '[$symbol$version]($style) '

[fill]
symbol = ' '

[directory]
style = 'bold flamingo'
truncation_length = 16
truncation_symbol = '…/'

[username]
show_always = false
style_user = 'lavender'
format = '[$user]($style)'

[hostname]
ssh_only = true
style = 'lavender'
format = '[@$hostname]($style) '

[time]
disabled = false
style = 'overlay1'
format = '[$time]($style)'
time_format = '%H:%M'
