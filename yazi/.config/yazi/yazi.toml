"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 2, 4, 3 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true
scrolloff      = 5

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 600
max_height      = 900

[opener]
edit = [
	{ run = 'nvim "%*"', orphan = true, desc = "nvim", block = true },
]

[open]
prepend_rules = [
	{ mime = "text/*", use = [ "edit" ] },
	{ mime = "application/{json,ndjson,x-wine-extension-ini}", use = [ "edit" ] },
	{ mime = "*/javascript", use = [ "edit" ] },
	{ mime = "inode/empty", use = [ "edit" ] },
	{ name = ".git*", use = [ "edit" ] },
	{ name = "*.{toml,yaml,yml,ini,cfg,conf,lock,log,md,txt,sh,zsh,bash,lua}", use = [ "edit" ] },
]

[input]
cursor_blink = false
