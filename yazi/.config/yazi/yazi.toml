"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 2, 4, 3 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true
scrolloff      = 5

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 600
max_height      = 900

[input]
cursor_blink = false
